<form class="debt-form" [formGroup]="debtForm" (ngSubmit)="onSubmit()">
	<div class="mb-3">
		<label for="description" class="form-label">Descrição</label>
		<input id="description" type="text" class="form-control" formControlName="description" />
	</div>

	<div class="row">
		<div class="col-md-6 mb-3">
			<label for="client" class="form-label">Cliente</label>
			<select id="client" class="form-select" formControlName="client" [compareWith]="compareById">
				<option [ngValue]="emptyClient">Selecione um cliente</option>
				@for (client of clients$ | async; track client.id) {
					<option [ngValue]="client">{{ client.companyName }}</option>
				}
			</select>
		</div>

		<div class="col-md-6 mb-3">
			<label for="debtor" class="form-label">Devedor</label>
			<select id="debtor" class="form-select" formControlName="debtor" [compareWith]="compareById">
				<option [ngValue]="emptyDebtor">Selecione um devedor</option>
				@for (debtor of debtors$ | async; track debtor.id) {
					<option [ngValue]="debtor">{{ debtor.name }}</option>
				}
			</select>
		</div>
	</div>

	<div class="row">
		<div class="col-md-4 mb-3">
			<label for="amount" class="form-label">Valor</label>
			<input id="amount" type="number" min="0.01" step="0.01" class="form-control" formControlName="amount" />
		</div>

		<div class="col-md-4 mb-3">
			<label for="dueDate" class="form-label">Vencimento</label>
			<input id="dueDate" type="date" class="form-control" formControlName="dueDate" />
		</div>

		<div class="col-md-4 mb-3">
			<label for="status" class="form-label">Status</label>
			<select id="status" class="form-select" formControlName="status">
				<option value="PENDENTE">Pendente</option>
				<option value="PAGO">Pago</option>
				<option value="VENCIDO">Vencido</option>
				<option value="NEGOCIADO">Negociado</option>
			</select>
		</div>
	</div>

	<div class="form-actions">
		<button type="submit" class="btn save-action">Salvar</button>
	</div>
</form>
