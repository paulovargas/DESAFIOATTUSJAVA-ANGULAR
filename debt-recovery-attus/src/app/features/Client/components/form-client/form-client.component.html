<form class="client-form" [formGroup]="clientForm" (ngSubmit)="onSubmit()">
	<div class="mb-3">
		<label for="cnpj" class="form-label">CNPJ</label>
		<input id="cnpj" type="text" class="form-control" formControlName="cnpj" (blur)="buscarCnpj()" />
		@if (clientForm.controls.cnpj.touched && clientForm.controls.cnpj.hasError('cnpj')) {
			<small class="form-text text-danger">CNPJ invalido.</small>
		}
		@if (isLoadingCnpj) {
			<small class="form-text">Buscando CNPJ...</small>
		}
		@if (cnpjError) {
			<small class="form-text text-danger">{{ cnpjError }}</small>
		}
	</div>

	<div class="mb-3">
		<label for="companyName" class="form-label">Raz&atilde;o Social</label>
		<input id="companyName" type="text" class="form-control" formControlName="companyName" />
	</div>

	<app-endereco />

	<div class="mb-3">
		<label for="email" class="form-label">E-mail</label>
		<input id="email" type="email" class="form-control" formControlName="email" />
	</div>

	<div class="row">
		<div class="col-md-6 mb-3">
			<label for="contactName" class="form-label">Contato</label>
			<input id="contactName" type="text" class="form-control" formControlName="contactName" />
		</div>

		<div class="col-md-6 mb-3">
			<label for="phone" class="form-label">Telefone</label>
			<input id="phone" type="text" class="form-control" formControlName="phone" />
		</div>
	</div>

	<div class="form-actions">
		<button type="submit" class="btn save-action">Salvar</button>
	</div>
</form>
