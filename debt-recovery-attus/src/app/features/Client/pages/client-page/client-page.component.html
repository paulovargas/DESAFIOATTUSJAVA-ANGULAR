<form>
	<div class="client-toolbar mb-3">
		<div class="client-search">
			<label for="table-complete-search" class="form-label">Buscar por Raz&atilde;o Social ou CNPJ</label>
			<input
				id="table-complete-search"
				type="text"
				class="form-control"
				name="searchTerm"
				[(ngModel)]="searchTerm"
			/>
		</div>

		<select class="form-select page-size-select" name="clientSort" [(ngModel)]="sortBy">
			<option value="companyName">Ordenar por raz&atilde;o social</option>
			<option value="cnpj">Ordenar por CNPJ</option>
			<option value="id">Ordenar por c&oacute;digo</option>
		</select>

		<button type="button" class="btn client-action" (click)="openFormClient()">Cadastrar Cliente</button>
	</div>

	<div class="client-table-panel">
		<div class="table-responsive">
			<table class="table client-table">
				<thead>
					<tr>
						<th scope="col">C&oacute;digo</th>
						<th scope="col">Raz&atilde;o Social</th>
						<th scope="col">CNPJ</th>
						<th scope="col">E-mail</th>
						<th scope="col">Telefone</th>
						<th scope="col">A&ccedil;&otilde;es</th>
					</tr>
				</thead>
				<tbody>
					@for (client of paginatedClients$ | async; track client.id) {
						<tr>
							<th scope="row">{{ client.id }}</th>
							<td><ngb-highlight [result]="client.companyName" [term]="searchTerm" /></td>
							<td><ngb-highlight [result]="client.cnpj" [term]="searchTerm" /></td>
							<td>{{ client.email }}</td>
							<td>{{ client.phone }}</td>
							<td>
								<button type="button" class="btn table-action" (click)="openFormClient(client)">Editar</button>
							</td>
						</tr>
					} @empty {
						<tr>
							<td colspan="6" class="empty-state">Nenhum cliente encontrado</td>
						</tr>
					}
				</tbody>
			</table>
		</div>
	</div>

	<div class="client-pagination">
		<ngb-pagination [collectionSize]="(totalClients$ | async) || 0" [(page)]="page" [pageSize]="pageSize">
		</ngb-pagination>

		<select class="form-select page-size-select" name="pageSize" [(ngModel)]="pageSize">
			<option [ngValue]="10">10 itens por p&aacute;gina</option>
			<option [ngValue]="25">25 itens por p&aacute;gina</option>
			<option [ngValue]="50">50 itens por p&aacute;gina</option>
		</select>
	</div>
</form>
